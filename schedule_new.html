<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>2026년 5월 근무불가일 취합</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 12px;
      background: #f7f7f8;
      color: #111827;
    }

    h1 {
      font-size: 20px;
      line-height: 1.3;
      margin: 4px 0 14px;
    }

    h2 {
      font-size: 17px;
      margin: 0 0 12px;
    }

    .box {
      background: white;
      padding: 14px;
      border-radius: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 10px #00000010;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input[type="text"] {
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 10px;
      width: 100%;
      font-size: 16px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 700;
    }

    .check-row input {
      width: 18px;
      height: 18px;
    }

    .hint {
      color: #666;
      font-size: 13px;
      line-height: 1.45;
      margin: 8px 0 0;
    }

    .danger {
      color: #dc2626;
      font-size: 14px;
      font-weight: 700;
      background: #fef2f2;
      padding: 8px 10px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .available-all-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 5px;
    }

    .day-name {
      text-align: center;
      font-weight: 700;
      color: #666;
      font-size: 12px;
      padding: 4px 0;
    }

    .day {
      min-height: 112px;
      background: white;
      border-radius: 12px;
      padding: 5px;
      border: 1px solid #e4e4e7;
      box-sizing: border-box;
      overflow: hidden;
    }

    .empty {
      background: transparent;
      border: none;
    }

    .date {
      font-weight: 800;
      font-size: 12px;
      margin-bottom: 5px;
      text-align: center;
    }

    .shift {
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      padding: 5px 4px;
      margin-bottom: 5px;
      background: #fafafa;
      cursor: pointer;
      min-height: 42px;
    }

    .shift.selected {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .shift-title {
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .shift-names {
      font-size: 10px;
      line-height: 1.25;
      color: #444;
      word-break: keep-all;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      background: white;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid #eee;
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #fafafa;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .box {
        padding: 12px;
        border-radius: 14px;
      }

      .calendar {
        gap: 4px;
      }

      .day {
        min-height: 106px;
        padding: 4px;
        border-radius: 10px;
      }

      .date {
        font-size: 11px;
      }

      .shift {
        padding: 4px 3px;
        min-height: 40px;
      }

      .shift-title {
        font-size: 10px;
      }

      .shift-names {
        font-size: 9px;
      }
    }
  </style>
</head>

<body>
  <h1>2026년 5월 근무불가일 취합</h1>
  <div class="box">
    <label>주의사항</label>
    <p class="danger">근무 불가일은 꼭 필요한 일정만 제출해주세요! 제출 후 전체 현황을 반영해 특정 날짜에 신청이 몰릴 경우 일부 조정될 수 있어요.</p> 
    </div>
  <div class="box">
    <label for="nameInput">이름 입력</label>
    <input id="nameInput" type="text" placeholder="예: 한주리" />

    <div class="check-row">
      <input id="availableAllCheck" type="checkbox" />
      <span>모든 일자 근무 가능합니다</span>
    </div>

    <p class="hint">이름을 입력한 뒤 각 날짜의 점심/저녁 근무를 클릭하면 근무불가일로 등록/해제됩니다.</p>
    <p class="danger">입력한 내용은 모든 사용자가 함께 볼 수 있습니다.</p>
  </div>

  <div class="box">
    <div class="calendar" id="calendar"></div>
  </div>

  <div class="box">
    <h2>날짜별 취합표</h2>

    <div class="available-all-box" id="availableAllSummary">
      모든 근무 가능자 : -
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>날짜</th>
            <th>점심근무 불가</th>
            <th>저녁근무 불가</th>
          </tr>
        </thead>
        <tbody id="summary"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      remove,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

// Firebase 콘솔에서 발급받은 값으로 교체
const firebaseConfig = {
    apiKey: "AIzaSyDR5cny5ZIioHX_9-_loGAuCeLofPmJuAw",
    authDomain: "ricotapa-schedule.firebaseapp.com",
    projectId: "ricotapa-schedule",
    storageBucket: "ricotapa-schedule.firebasestorage.app",
    messagingSenderId: "866669831734",
    appId: "1:866669831734:web:13feb9632867811b409a97"
  };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const YEAR = 2026;
    const MONTH = 5;
    const DAYS = 31;

    const calendar = document.getElementById("calendar");
    const summary = document.getElementById("summary");
    const nameInput = document.getElementById("nameInput");
    const availableAllCheck = document.getElementById("availableAllCheck");
    const availableAllSummary = document.getElementById("availableAllSummary");

    nameInput.value = localStorage.getItem("workerName") || "";

    let unavailable = {};
    let availableAll = {};

    const weekNames = ["일", "월", "화", "수", "목", "금", "토"];

    const shifts = [
      { key: "lunch", label: "점심" },
      { key: "dinner", label: "저녁" }
    ];

    function dateKey(day) {
      return `${YEAR}-${String(MONTH).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function safeName(name) {
      return name.replace(/[.#$/[\]]/g, "_");
    }

    function getCurrentName() {
      return nameInput.value.trim();
    }

    function getCurrentPersonKey() {
      const name = getCurrentName();
      return name ? safeName(name) : "";
    }

    function getNames(dayKey, shiftKey) {
      return Object.values(unavailable?.[dayKey]?.[shiftKey] || {}).map(v => v.name);
    }

    function isSelected(dayKey, shiftKey, personKey) {
      return Boolean(unavailable?.[dayKey]?.[shiftKey]?.[personKey]);
    }

    function updateAvailableAllCheckbox() {
      const personKey = getCurrentPersonKey();
      availableAllCheck.checked = Boolean(personKey && availableAll?.[personKey]);
    }

    function toggleAvailableAll() {
      const name = getCurrentName();

      if (!name) {
        alert("먼저 이름을 입력해주세요.");
        availableAllCheck.checked = false;
        return;
      }

      const personKey = safeName(name);
      const path = ref(db, `availableAll/${personKey}`);

      if (availableAllCheck.checked) {
        set(path, {
          name,
          createdAt: Date.now()
        });
      } else {
        remove(path);
      }
    }

    function toggleShift(day, shiftKey) {
      const name = getCurrentName();

      if (!name) {
        alert("먼저 이름을 입력해주세요.");
        return;
      }

      const key = dateKey(day);
      const personKey = safeName(name);
      const path = ref(db, `unavailable/${key}/${shiftKey}/${personKey}`);

      if (isSelected(key, shiftKey, personKey)) {
        remove(path);
      } else {
        set(path, {
          name,
          createdAt: Date.now()
        });
      }
    }

    function render() {
      updateAvailableAllCheckbox();

      calendar.innerHTML = "";

      weekNames.forEach(dayName => {
        const el = document.createElement("div");
        el.className = "day-name";
        el.textContent = dayName;
        calendar.appendChild(el);
      });

      const firstDay = new Date(YEAR, MONTH - 1, 1).getDay();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        calendar.appendChild(empty);
      }

      const personKey = getCurrentPersonKey();

      for (let day = 1; day <= DAYS; day++) {
        const key = dateKey(day);

        const dayEl = document.createElement("div");
        dayEl.className = "day";

        let html = `<div class="date">${day}일</div>`;

        shifts.forEach(shift => {
          const names = getNames(key, shift.key);
          const selected = personKey && isSelected(key, shift.key, personKey);

          html += `
            <div class="shift ${selected ? "selected" : ""}" data-day="${day}" data-shift="${shift.key}">
              <div class="shift-title">${shift.label}</div>
              <div class="shift-names">${names.length ? names.join("<br>") : "-"}</div>
            </div>
          `;
        });

        dayEl.innerHTML = html;

        dayEl.querySelectorAll(".shift").forEach(el => {
          el.addEventListener("click", event => {
            event.stopPropagation();
            toggleShift(Number(el.dataset.day), el.dataset.shift);
          });
        });

        calendar.appendChild(dayEl);
      }

      renderSummary();
    }

    function renderSummary() {
      summary.innerHTML = "";

      const availableNames = Object.values(availableAll || {}).map(v => v.name);

      availableAllSummary.textContent =
        `모든 근무 가능자 : ${availableNames.length ? availableNames.join(", ") : "-"}`;

      for (let day = 1; day <= DAYS; day++) {
        const key = dateKey(day);
        const lunchNames = getNames(key, "lunch");
        const dinnerNames = getNames(key, "dinner");

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>2026-05-${String(day).padStart(2, "0")}</td>
          <td>${lunchNames.length ? lunchNames.join(", ") : "-"}</td>
          <td>${dinnerNames.length ? dinnerNames.join(", ") : "-"}</td>
        `;

        summary.appendChild(tr);
      }
    }

    nameInput.addEventListener("input", () => {
      localStorage.setItem("workerName", getCurrentName());
      render();
    });

    availableAllCheck.addEventListener("change", toggleAvailableAll);

    onValue(ref(db, "unavailable"), snapshot => {
      unavailable = snapshot.val() || {};
      render();
    });

    onValue(ref(db, "availableAll"), snapshot => {
      availableAll = snapshot.val() || {};
      render();
    });
  </script>
</body>
</html>
