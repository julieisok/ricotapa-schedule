<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>2026년 5월 근무불가일 취합</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background:#f7f7f8; }
    h1 { font-size: 22px; }
    .box { background:white; padding:16px; border-radius:14px; margin-bottom:16px; box-shadow:0 2px 8px #0001; }
    input { padding:10px; border:1px solid #ddd; border-radius:8px; width:220px; }
    .calendar { display:grid; grid-template-columns: repeat(7, 1fr); gap:8px; }
    .day-name { text-align:center; font-weight:700; color:#666; }
    .day {
      min-height:90px; background:white; border-radius:12px; padding:8px;
      border:1px solid #e4e4e7; cursor:pointer;
    }
    .day.selected { border:2px solid #2563eb; background:#eff6ff; }
    .date { font-weight:700; margin-bottom:6px; }
    .names { font-size:12px; color:#444; line-height:1.4; }
    .empty { background:transparent; border:none; cursor:default; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border-bottom:1px solid #eee; padding:10px; text-align:left; }
    th { background:#fafafa; }
    .hint { color:#666; font-size:13px; }
    .danger { color: #dc2626; font-size: 14px; font-weight: 700;    /* bold */ }
  </style>
</head>
<body>
  <h1>2026년 5월 근무불가일 취합</h1>
   <div class="box">
    <label>주의사항</label>
    <p class="danger">근무 불가일은 꼭 필요한 일정만 제출해주세요! 제출 후 전체 현황을 반영해 특정 날짜에 신청이 몰릴 경우 일부 조정될 수 있어요.</p> 
    </div>
  <div class="box">
    <label>이름 입력: </label>
    <input id="nameInput" placeholder="예: 한주리" />
    <p class="hint">이름을 입력한 뒤 날짜를 클릭하면 근무불가일로 등록/해제됩니다.</p>
  </div>

  <div class="box">
    <div class="calendar" id="calendar"></div>
  </div>

  <div class="box">
    <h2>날짜별 취합표</h2>
    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th>근무불가 인원</th>
          <th>명단</th>
        </tr>
      </thead>
      <tbody id="summary"></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getDatabase, ref, set, remove, onValue
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";

    // Firebase 콘솔에서 발급받은 값으로 교체
    const firebaseConfig = {
    apiKey: "AIzaSyDR5cny5ZIioHX_9-_loGAuCeLofPmJuAw",
    authDomain: "ricotapa-schedule.firebaseapp.com",
    projectId: "ricotapa-schedule",
    storageBucket: "ricotapa-schedule.firebasestorage.app",
    messagingSenderId: "866669831734",
    appId: "1:866669831734:web:13feb9632867811b409a97"
  };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const YEAR = 2026;
    const MONTH = 5;
    const DAYS = 31;

    const calendar = document.getElementById("calendar");
    const summary = document.getElementById("summary");
    const nameInput = document.getElementById("nameInput");

    nameInput.value = localStorage.getItem("workerName") || "";
    nameInput.addEventListener("input", () => {
      localStorage.setItem("workerName", nameInput.value.trim());
      render();
    });

    let unavailable = {};

    const weekNames = ["일", "월", "화", "수", "목", "금", "토"];

    function dateKey(day) {
      return `${YEAR}-${String(MONTH).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function safeName(name) {
      return name.replace(/[.#$/[\]]/g, "_");
    }

    function toggleDay(day) {
      const name = nameInput.value.trim();
      if (!name) {
        alert("먼저 이름을 입력해주세요.");
        return;
      }

      const key = dateKey(day);
      const personKey = safeName(name);
      const path = ref(db, `unavailable/${key}/${personKey}`);

      if (unavailable[key]?.[personKey]) {
        remove(path);
      } else {
        set(path, { name, createdAt: Date.now() });
      }
    }

    function render() {
      calendar.innerHTML = "";

      weekNames.forEach(w => {
        const el = document.createElement("div");
        el.className = "day-name";
        el.textContent = w;
        calendar.appendChild(el);
      });

      const firstDay = new Date(YEAR, MONTH - 1, 1).getDay();

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        calendar.appendChild(empty);
      }

      const currentName = safeName(nameInput.value.trim());

      for (let day = 1; day <= DAYS; day++) {
        const key = dateKey(day);
        const people = unavailable[key] || {};
        const names = Object.values(people).map(v => v.name);
        const selected = currentName && people[currentName];

        const el = document.createElement("div");
        el.className = `day ${selected ? "selected" : ""}`;
        el.onclick = () => toggleDay(day);

        el.innerHTML = `
          <div class="date">${day}일</div>
          <div class="names">${names.length ? names.join("<br>") : "-"}</div>
        `;

        calendar.appendChild(el);
      }

      renderSummary();
    }

    function renderSummary() {
      summary.innerHTML = "";

      for (let day = 1; day <= DAYS; day++) {
        const key = dateKey(day);
        const names = Object.values(unavailable[key] || {}).map(v => v.name);

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>2026-05-${String(day).padStart(2, "0")}</td>
          <td>${names.length}명</td>
          <td>${names.length ? names.join(", ") : "-"}</td>
        `;
        summary.appendChild(tr);
      }
    }

    onValue(ref(db, "unavailable"), snapshot => {
      unavailable = snapshot.val() || {};
      render();
    });
  </script>
</body>
</html>
